<script>

let pessoas = [];
let itens = [];
let itemAtual = null;
let divisaoTemp = [];
let editandoIndex = null;

let couvert = {valor:0,qtd:0,pessoas:[]};
let modoDivisao = "item";

function abrirMesa(){ tela1.classList.add("hidden"); tela2.classList.remove("hidden"); }

function criarPessoas(){
let n = numPessoas.value;
pessoas = [];
for(let i=0;i<n;i++) pessoas.push({nome:"Pessoa "+(i+1), total:0, itens:[]});
renderPessoas(); tela2.classList.add("hidden"); tela3.classList.remove("hidden");
}

function renderPessoas(){
listaPessoas.innerHTML = "";
pessoas.forEach((p,i)=>{
listaPessoas.innerHTML += `<input value="${p.nome}" onchange="pessoas[${i}].nome=this.value">`;
});
}

function irParaConta(){ tela3.classList.add("hidden"); tela4.classList.remove("hidden"); renderItens(); }

function adicionarItem(){ editandoIndex=null; nomeItem.value=""; qtdItem.value=""; precoItem.value=""; btnDelete.classList.add("hidden"); tela4.classList.add("hidden"); telaAddItem.classList.remove("hidden"); }

function editarItem(i){ let item=itens[i]; editandoIndex=i; nomeItem.value=item.nome; qtdItem.value=item.qtd; precoItem.value=item.preco; btnDelete.classList.remove("hidden"); tela4.classList.add("hidden"); telaAddItem.classList.remove("hidden"); }

function salvarItem(){
let nome=nomeItem.value, qtd=Number(qtdItem.value), preco=Number(precoItem.value);
if(editandoIndex!==null){ Object.assign(itens[editandoIndex],{nome,qtd,preco}); }
else itens.push({nome,qtd,preco,divisoes:[]});
voltarLista();
}

function apagarItemConfirm(){ if(confirm("Apagar?")){ itens.splice(editandoIndex,1); voltarLista(); } }

function abrirDivisao(){
modoDivisao="item";
itemAtual = editandoIndex;
divisaoTemp = [{qtd: itens[itemAtual].qtd, pessoas: []}];
telaAddItem.classList.add("hidden");
telaDivisao.classList.remove("hidden");
renderDivisao();
}

function renderDivisao(){
let div=divisaoConteudo; div.innerHTML="";
let total=itens[itemAtual].qtd;

div.innerHTML+=`<b>Total: ${total}</b><hr>`;

divisaoTemp.forEach((d,i)=>{
div.innerHTML+=`Qtd:<input type='number' value='${d.qtd}' onchange='divisaoTemp[${i}].qtd=Number(this.value);renderDivisao()'><br>`+
`<b>Pessoas:</b><br>`+
pessoas.map((p,pi)=>`<label><input type='checkbox' ${d.pessoas.includes(pi)?"checked":""} onchange='togglePessoa(${i},${pi})'> ${p.nome}</label>`).join("<br>")+"<hr>";
});
}

function togglePessoa(i,p){
let arr=divisaoTemp[i].pessoas;
arr.includes(p)?divisaoTemp[i].pessoas=arr.filter(x=>x!=p):arr.push(p);
}

function salvarDivisao(){

if(modoDivisao==="item"){
itens[itemAtual].divisoes=divisaoTemp;
}

telaDivisao.classList.add("hidden");
tela4.classList.remove("hidden");

renderItens();
}

function voltarLista(){ telaAddItem.classList.add("hidden"); telaFinal.classList.add("hidden"); tela4.classList.remove("hidden"); renderItens(); }

function renderItens(){
let total=0; let html="";
itens.forEach((item,i)=>{
let val=item.qtd*item.preco; total+=val;
let pessoasStr = item.divisoes.flatMap(d=>d.pessoas).map(i=>pessoas[i].nome).join(", ") || "todos";
html+=`<div class='item'><div class='item-nome'>${item.nome}</div><div>${item.qtd}x - R$ ${val.toFixed(2)}</div><div class='item-sub'>dividido por: ${pessoasStr}</div><button class='btn-edit' onclick='editarItem(${i})'>Editar</button></div>`;
});
document.getElementById("itens").innerHTML=html;

let taxa=Number(document.getElementById("taxa").value)||0;
let totalFinal=total*(1+taxa/100);
previewTotal.innerHTML=`Total itens: R$ ${total.toFixed(2)} | c/ taxa: R$ ${totalFinal.toFixed(2)}`;
}

function abrirDivisaoCouvert(){

modoDivisao="couvert";

couvert.valor = Number(document.getElementById("couvertValor").value) || 0;
couvert.qtd = Number(document.getElementById("couvertQtd").value) || 0;

couvert.pessoas = pessoas.map((p,i)=>i);

tela4.classList.add("hidden");
telaDivisao.classList.remove("hidden");

divisaoConteudo.innerHTML =
"<b>Dividir Couvert</b><br><br>" +
pessoas.map((p,i)=>`
<label>
<input type="checkbox" checked onchange="toggleCouvert(${i})">
${p.nome}
</label>
`).join("<br>");
}

function toggleCouvert(i){
if(couvert.pessoas.includes(i)){
couvert.pessoas=couvert.pessoas.filter(p=>p!=i);
}else{
couvert.pessoas.push(i);
}
}

function finalizarConta(){ tela4.classList.add("hidden"); telaFinal.classList.remove("hidden"); calcular(); }

function calcular(){

pessoas.forEach(p=>{p.total=0;p.itens=[]});

let total=0;

itens.forEach(item=>{
let totalItem=item.qtd*item.preco; total+=totalItem;

if(item.divisoes.length===0){
let porPessoa=totalItem/pessoas.length;
pessoas.forEach(p=>{
p.total+=porPessoa;
p.itens.push(`${item.nome} - R$ ${(porPessoa).toFixed(2)}`);
});
}else{

item.divisoes.forEach(d=>{
let valor=(d.qtd/item.qtd)*totalItem;
let porPessoa=valor/d.pessoas.length;

d.pessoas.forEach(pi=>{
pessoas[pi].total+=porPessoa;
pessoas[pi].itens.push(`${item.nome} - R$ ${(porPessoa).toFixed(2)}`);
});
});

}

});

let taxa=Number(document.getElementById("taxa").value)||0;

let totalCouvert=couvert.valor*couvert.qtd;

if(couvert.pessoas.length>0){
let porPessoa=totalCouvert/couvert.pessoas.length;

couvert.pessoas.forEach(pi=>{
pessoas[pi].total+=porPessoa;
pessoas[pi].itens.push(`Couvert - R$ ${porPessoa.toFixed(2)}`);
});
}

let html="<b>🍺 QUANTO DEU?</b><br><b>Resultado</b><br><br>";

pessoas.forEach(p=>{
let final=(p.total*(1+taxa/100));
html+=`<b>${p.nome}: R$ ${final.toFixed(2)}</b><br>`;
p.itens.forEach(it=> html+=`${it}<br>`);
html+="<br>";
});

resultado.innerHTML=html;

let txt=`🍺 QUANTO DEU?\nResultado\n\n`;

pessoas.forEach(p=>{
let final=(p.total*(1+taxa/100));
txt+=`${p.nome}: R$ ${final.toFixed(2)}\n`;
p.itens.forEach(it=> txt+=it+"\n");
txt+="\n";
});

window.textoFinal=txt;

}

function copiarTexto(){ navigator.clipboard.writeText(window.textoFinal || ""); alert("Copiado!"); }

</script>
